<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Position Word Typing Effect</title>
  <style>
    .typing-container {
      position: relative;
      font-size: 24px;
      text-align: center;
      margin-top: 100px;
    }

    .typing-word {
      display: inline-block;
      opacity: 0;
      animation: typingAnimation 1s forwards;
    }

    @keyframes typingAnimation {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    .typing-word:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-word:nth-child(2) {
      animation-delay: 1s;
    }

    .typing-word:nth-child(3) {
      animation-delay: 2s;
    }

    .typing-word:nth-child(4) {
      animation-delay: 3s;
    }

    .typing-word:nth-child(5) {
      animation-delay: 4s;
    }
  </style>
</head>
<body>
  <div class="typing-container">
    <div class="typing-word">Word</div>
    <div class="typing-word">by</div>
    <div class="typing-word">word</div>
    <div class="typing-word">typing</div>
    <div class="typing-word">effect</div>
  </div>
</body>
</html>
